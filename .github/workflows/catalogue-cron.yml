name: Catalogue Agent — Nightly Update

on:
  schedule:
    # Every day at 7:00 UTC (3:00 AM ET)
    - cron: '0 7 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  catalogue-update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      searxng:
        image: searxng/searxng:latest
        ports:
          - 8888:8080
        env:
          SEARXNG_BASE_URL: http://localhost:8888

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run Catalogue Agent
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DISCORD_CATALOGUE_WEBHOOK: ${{ secrets.DISCORD_CATALOGUE_WEBHOOK }}
          SEARXNG_URL: http://localhost:8888
        run: node agent/catalogue-agent.js

      - name: Commit & push catalogue changes
        run: |
          git config user.name "catalogue-bot"
          git config user.email "bot@shopcompy.ca"
          git add data/catalogue.json public/images/products/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "catalogue: nightly update $(date -u +%Y-%m-%d)"
          git push

  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run only on Mondays
    if: github.event.schedule == '0 7 * * 1' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run Health Check
        env:
          DISCORD_CATALOGUE_WEBHOOK: ${{ secrets.DISCORD_CATALOGUE_WEBHOOK }}
        run: node agent/health-check.js

      - name: Commit & push health check changes
        run: |
          git config user.name "catalogue-bot"
          git config user.email "bot@shopcompy.ca"
          git add data/catalogue.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "health-check: weekly cleanup $(date -u +%Y-%m-%d)"
          git push
