<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    Compy Assistant — Mini avatar version
    For tips, tooltips, search companion
  -->

  <!-- Body (laptop shape) -->
  <rect x="16" y="36" width="32" height="20" rx="4" fill="#1e3a5f"/>
  <!-- Keyboard hint -->
  <rect x="21" y="41" width="22" height="8" rx="2" fill="#152d4a"/>
  <g fill="#2563eb" opacity="0.3">
    <rect x="23" y="43" width="4" height="2" rx="0.5"/>
    <rect x="29" y="43" width="4" height="2" rx="0.5"/>
    <rect x="35" y="43" width="4" height="2" rx="0.5"/>
  </g>

  <!-- Base (trapezoid) -->
  <path d="M18 56 L46 56 L50 62 L14 62 Z" fill="#1e3a5f"/>

  <!-- Neck -->
  <rect x="27" y="31" width="10" height="6" rx="2" fill="#1e3a5f"/>

  <!-- Head (screen) -->
  <rect x="14" y="6" width="36" height="27" rx="6" fill="#1e3a5f"/>
  <!-- Screen -->
  <rect x="18" y="9" width="28" height="20" rx="4" fill="#0f2240"/>
  <!-- Eyes -->
  <circle cx="27" cy="17" r="3" fill="#2563eb"/>
  <circle cx="37" cy="17" r="3" fill="#2563eb"/>
  <!-- Eye shine -->
  <circle cx="28" cy="16" r="1" fill="#93c5fd"/>
  <circle cx="38" cy="16" r="1" fill="#93c5fd"/>
  <!-- Smile -->
  <path d="M26 23 Q32 28 38 23" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Antenna -->
  <rect x="30" y="1" width="4" height="7" rx="2" fill="#1e3a5f"/>
  <circle cx="32" cy="2" r="3" fill="#2563eb"/>

  <!-- Arms -->
  <rect x="6" y="39" width="10" height="5" rx="2.5" fill="#1e3a5f"/>
  <rect x="48" y="39" width="10" height="5" rx="2.5" fill="#1e3a5f"/>
</svg>
