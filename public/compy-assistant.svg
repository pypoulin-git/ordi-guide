<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Compy Assistant — Mini avatar, matching new brand palette -->

  <!-- Body (laptop) -->
  <rect x="16" y="36" width="32" height="20" rx="5" fill="#1e3a8a"/>
  <!-- Screen hint -->
  <rect x="20" y="39" width="24" height="12" rx="3" fill="#1e40af"/>
  <rect x="22" y="41" width="10" height="4" rx="1" fill="#2563eb" opacity="0.2"/>

  <!-- Base -->
  <path d="M18 56 L46 56 L50 62 L14 62 Z" fill="#1e40af"/>

  <!-- Neck -->
  <rect x="27" y="31" width="10" height="6" rx="3" fill="#1e40af"/>

  <!-- Head -->
  <rect x="12" y="6" width="40" height="28" rx="10" fill="#1e40af"/>
  <!-- Face panel -->
  <rect x="16" y="10" width="32" height="20" rx="7" fill="#1e3a8a"/>

  <!-- Antenna -->
  <rect x="28" y="1" width="8" height="8" rx="4" fill="#2563eb"/>
  <circle cx="32" cy="2" r="3.5" fill="#3b82f6"/>
  <circle cx="32" cy="2" r="1.8" fill="#93c5fd"/>

  <!-- Ears -->
  <circle cx="8" cy="19" r="3.5" fill="#3b82f6"/>
  <circle cx="8" cy="19" r="1.5" fill="#93c5fd"/>
  <circle cx="56" cy="19" r="3.5" fill="#7c3aed"/>
  <circle cx="56" cy="19" r="1.5" fill="#c4b5fd"/>

  <!-- Eyes -->
  <circle cx="25" cy="19" r="4" fill="#0f172a"/>
  <circle cx="39" cy="19" r="4" fill="#0f172a"/>
  <!-- Highlights -->
  <circle cx="26.5" cy="17.5" r="1.5" fill="#93c5fd"/>
  <circle cx="40.5" cy="17.5" r="1.5" fill="#93c5fd"/>

  <!-- Smile -->
  <path d="M25 25 Q32 31 39 25" stroke="#2563eb" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Arms -->
  <rect x="4" y="39" width="12" height="5" rx="2.5" fill="#1e40af"/>
  <rect x="48" y="39" width="12" height="5" rx="2.5" fill="#1e40af"/>
</svg>