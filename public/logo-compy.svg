<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" fill="none">
  <!--
    Shop Compy Full Logo — Professional flat design
    Palette: #1e3a8a (navy), #1e40af (dark blue), #2563eb (accent), #3b82f6, #60a5fa, #93c5fd
  -->

  <!-- ═══ GLOW EFFECTS ═══ -->
  <circle cx="95" cy="128" r="22" fill="#3b82f6" opacity="0.12"/>
  <circle cx="305" cy="128" r="22" fill="#7c3aed" opacity="0.12"/>

  <!-- ═══ LAPTOP BASE (perspective keyboard) ═══ -->
  <path d="M95 400 L305 400 L350 446 L50 446 Z" fill="#1e40af"/>
  <path d="M105 400 L295 400 L330 436 L70 436 Z" fill="#2563eb" opacity="0.15"/>
  <!-- Keyboard hints -->
  <rect x="140" y="410" width="120" height="3" rx="1.5" fill="#3b82f6" opacity="0.2"/>
  <rect x="160" y="418" width="80" height="3" rx="1.5" fill="#3b82f6" opacity="0.15"/>

  <!-- ═══ BODY (laptop screen) ═══ -->
  <rect x="110" y="230" width="180" height="170" rx="16" fill="#1e3a8a"/>
  <!-- Screen bezel highlight -->
  <rect x="110" y="230" width="180" height="8" rx="4" fill="#2563eb" opacity="0.15"/>

  <!-- Chest screen -->
  <rect x="130" y="254" width="140" height="90" rx="12" fill="#1e40af"/>
  <!-- Screen content: "Shop Compy" -->
  <text x="200" y="296" text-anchor="middle" fill="white" font-size="34" font-weight="700" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" letter-spacing="1">Shop</text>
  <text x="200" y="333" text-anchor="middle" fill="white" font-size="34" font-weight="700" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" letter-spacing="1">Compy</text>
  <!-- Screen shine -->
  <rect x="136" y="260" width="50" height="24" rx="6" fill="#3b82f6" opacity="0.1"/>

  <!-- ═══ NECK ═══ -->
  <rect x="170" y="205" width="60" height="30" rx="10" fill="#1e40af"/>

  <!-- ═══ HEAD ═══ -->
  <rect x="115" y="50" width="170" height="160" rx="28" fill="#1e40af"/>
  <!-- Inner face -->
  <rect x="132" y="66" width="136" height="128" rx="20" fill="#1e3a8a"/>

  <!-- ═══ ANTENNA ═══ -->
  <rect x="188" y="22" width="24" height="32" rx="12" fill="#2563eb"/>
  <circle cx="200" cy="18" r="14" fill="#3b82f6"/>
  <circle cx="200" cy="18" r="7" fill="#93c5fd"/>
  <!-- Antenna glow -->
  <circle cx="200" cy="18" r="18" fill="#3b82f6" opacity="0.1"/>

  <!-- ═══ EARS ═══ -->
  <!-- Left ear -->
  <circle cx="95" cy="128" r="14" fill="#3b82f6"/>
  <circle cx="95" cy="128" r="7" fill="#93c5fd"/>
  <!-- Right ear -->
  <circle cx="305" cy="128" r="14" fill="#7c3aed"/>
  <circle cx="305" cy="128" r="7" fill="#c4b5fd"/>

  <!-- ═══ EYES ═══ -->
  <ellipse cx="170" cy="122" rx="18" ry="22" fill="#0f172a"/>
  <ellipse cx="230" cy="122" rx="18" ry="22" fill="#0f172a"/>
  <!-- Eye highlights -->
  <circle cx="176" cy="114" r="6" fill="#93c5fd"/>
  <circle cx="236" cy="114" r="6" fill="#93c5fd"/>
  <!-- Pupils -->
  <circle cx="170" cy="124" r="8" fill="#1e3a8a"/>
  <circle cx="230" cy="124" r="8" fill="#1e3a8a"/>

  <!-- ═══ SMILE ═══ -->
  <path d="M178 158 Q200 176 222 158" stroke="#2563eb" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- ═══ ARMS ═══ -->
  <!-- Left arm -->
  <rect x="66" y="262" width="44" height="24" rx="12" fill="#1e40af"/>
  <circle cx="72" cy="274" r="12" fill="#1e40af"/>
  <!-- Right arm -->
  <rect x="290" y="262" width="44" height="24" rx="12" fill="#1e40af"/>
  <circle cx="328" cy="274" r="12" fill="#1e40af"/>

  <!-- ═══ LIGHT BULB (left side) ═══ -->
  <circle cx="72" cy="240" r="18" fill="#fbbf24"/>
  <circle cx="72" cy="240" r="12" fill="#fde68a"/>
  <!-- Bulb base -->
  <rect x="66" y="254" width="12" height="5" rx="2" fill="#f59e0b"/>
  <!-- Rays -->
  <line x1="56" y1="228" x2="50" y2="222" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="240" x2="46" y2="242" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="56" y1="252" x2="50" y2="258" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="222" x2="62" y2="216" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Glow -->
  <circle cx="72" cy="240" r="24" fill="#fbbf24" opacity="0.08"/>

  <!-- ═══ MAGNIFYING GLASS (right side) ═══ -->
  <circle cx="332" cy="370" r="18" fill="none" stroke="#60a5fa" stroke-width="4"/>
  <circle cx="332" cy="370" r="10" fill="#93c5fd" opacity="0.25"/>
  <!-- Handle -->
  <line x1="345" y1="383" x2="360" y2="398" stroke="#60a5fa" stroke-width="5" stroke-linecap="round"/>
  <!-- Glass shine -->
  <path d="M326 362 Q330 358 336 362" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
</svg>