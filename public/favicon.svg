<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Shop Compy Favicon — Robot mascot, professional flat design -->

  <!-- === HEAD === -->
  <rect x="12" y="6" width="40" height="30" rx="10" fill="#1e40af"/>
  <!-- Face panel -->
  <rect x="16" y="10" width="32" height="22" rx="7" fill="#1e3a8a"/>

  <!-- Antenna base -->
  <rect x="28" y="1" width="8" height="8" rx="4" fill="#2563eb"/>
  <!-- Antenna tip glow -->
  <circle cx="32" cy="2" r="3" fill="#60a5fa"/>

  <!-- Eyes -->
  <circle cx="25" cy="20" r="4.5" fill="#0f172a"/>
  <circle cx="39" cy="20" r="4.5" fill="#0f172a"/>
  <!-- Eye highlights -->
  <circle cx="27" cy="18" r="1.8" fill="#93c5fd"/>
  <circle cx="41" cy="18" r="1.8" fill="#93c5fd"/>

  <!-- Ears with glow -->
  <circle cx="8" cy="20" r="5" fill="#3b82f6" opacity="0.3"/>
  <circle cx="8" cy="20" r="3.5" fill="#3b82f6"/>
  <circle cx="8" cy="20" r="1.5" fill="#93c5fd"/>
  <circle cx="56" cy="20" r="5" fill="#7c3aed" opacity="0.3"/>
  <circle cx="56" cy="20" r="3.5" fill="#7c3aed"/>
  <circle cx="56" cy="20" r="1.5" fill="#c4b5fd"/>

  <!-- === BODY (laptop/screen) === -->
  <rect x="8" y="36" width="48" height="26" rx="6" fill="#1e3a8a"/>
  <!-- Screen bezel -->
  <rect x="12" y="39" width="40" height="20" rx="4" fill="#1e40af"/>
  <!-- Screen shine -->
  <rect x="14" y="41" width="16" height="8" rx="2" fill="#2563eb" opacity="0.3"/>

  <!-- === LIGHT BULB (left) === -->
  <circle cx="10" cy="34" r="6" fill="#fbbf24"/>
  <circle cx="10" cy="34" r="4" fill="#fde68a"/>
  <!-- Bulb base -->
  <rect x="8" y="38" width="4" height="2" rx="1" fill="#f59e0b"/>
  <!-- Rays -->
  <line x1="4" y1="30" x2="2" y2="28" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="3" y1="35" x2="1" y2="36" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="6" y1="27" x2="5" y2="25" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- === MAGNIFYING GLASS (bottom-right) === -->
  <circle cx="52" cy="54" r="6" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
  <circle cx="52" cy="54" r="3.5" fill="#93c5fd" opacity="0.4"/>
  <!-- Handle -->
  <line x1="56.5" y1="58.5" x2="61" y2="63" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
</svg>