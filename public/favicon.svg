<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Robot head -->
  <rect x="14" y="4" width="36" height="30" rx="10" fill="#4a8fa2"/>
  <!-- Ears -->
  <rect x="6" y="14" width="8" height="14" rx="4" fill="#4a8fa2"/>
  <rect x="50" y="14" width="8" height="14" rx="4" fill="#4a8fa2"/>
  <!-- Antenna -->
  <rect x="29" y="0" width="6" height="6" rx="3" fill="#4a8fa2"/>
  <!-- Eyes -->
  <circle cx="26" cy="18" r="4" fill="#2e7a8e"/>
  <circle cx="38" cy="18" r="4" fill="#2e7a8e"/>
  <circle cx="27.5" cy="16.5" r="1.5" fill="#8ec5d4"/>
  <circle cx="39.5" cy="16.5" r="1.5" fill="#8ec5d4"/>

  <!-- Body / laptop screen -->
  <rect x="10" y="34" width="44" height="26" rx="5" fill="#3d8a9e"/>
  <rect x="14" y="37" width="36" height="20" rx="3" fill="#2e7a8e"/>
  <!-- Screen base -->
  <rect x="10" y="34" width="44" height="6" rx="3" fill="#5ca0b2" opacity="0.4"/>

  <!-- Light bulb (top-left) -->
  <circle cx="12" cy="32" r="7" fill="#fbbf24"/>
  <circle cx="12" cy="32" r="5" fill="#fde68a"/>
  <path d="M10 37 L14 37 L13 39 L11 39 Z" fill="#fbbf24"/>
  <!-- Bulb rays -->
  <line x1="5" y1="28" x2="3" y2="26" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="4" y1="33" x2="2" y2="34" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="8" y1="25" x2="7" y2="23" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Magnifying glass (bottom-right) -->
  <circle cx="52" cy="54" r="6" fill="#bfdbfe" stroke="#8ec5d4" stroke-width="2"/>
  <circle cx="52" cy="54" r="3" fill="white" opacity="0.5"/>
  <line x1="56.5" y1="58.5" x2="61" y2="63" stroke="#8ec5d4" stroke-width="2.5" stroke-linecap="round"/>
</svg>
