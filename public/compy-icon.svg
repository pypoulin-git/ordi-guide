<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Shop Compy Icon — Robot head only, professional flat design -->

  <!-- Glow effects behind ears -->
  <circle cx="5" cy="32" r="7" fill="#3b82f6" opacity="0.15"/>
  <circle cx="59" cy="32" r="7" fill="#7c3aed" opacity="0.15"/>

  <!-- Antenna -->
  <rect x="27" y="2" width="10" height="12" rx="5" fill="#2563eb"/>
  <circle cx="32" cy="4" r="5" fill="#3b82f6"/>
  <circle cx="32" cy="4" r="2.5" fill="#93c5fd"/>

  <!-- Head -->
  <rect x="8" y="14" width="48" height="44" rx="14" fill="#1e40af"/>
  <!-- Face panel -->
  <rect x="13" y="19" width="38" height="34" rx="10" fill="#1e3a8a"/>

  <!-- Ears -->
  <circle cx="5" cy="32" r="4.5" fill="#3b82f6"/>
  <circle cx="5" cy="32" r="2" fill="#93c5fd"/>
  <circle cx="59" cy="32" r="4.5" fill="#7c3aed"/>
  <circle cx="59" cy="32" r="2" fill="#c4b5fd"/>

  <!-- Eyes -->
  <ellipse cx="24" cy="35" rx="7" ry="8" fill="#0f172a"/>
  <ellipse cx="40" cy="35" rx="7" ry="8" fill="#0f172a"/>
  <!-- Eye highlights -->
  <circle cx="26.5" cy="32" r="2.8" fill="#93c5fd"/>
  <circle cx="42.5" cy="32" r="2.8" fill="#93c5fd"/>
  <!-- Pupils -->
  <circle cx="24" cy="36" r="3.5" fill="#1e3a8a"/>
  <circle cx="40" cy="36" r="3.5" fill="#1e3a8a"/>

  <!-- Smile -->
  <path d="M24 48 Q32 56 40 48" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Light bulb hint -->
  <circle cx="52" cy="16" r="6" fill="#fbbf24" opacity="0.9"/>
  <circle cx="52" cy="16" r="3.5" fill="#fde68a"/>
  <line x1="52" y1="8" x2="52" y2="10" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="13" x2="56.5" y2="14" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="19" x2="56.5" y2="18" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
</svg>