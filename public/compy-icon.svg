<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Compy mascot head icon — transparent background -->

  <!-- Antenna -->
  <rect x="28" y="2" width="8" height="12" rx="4" fill="#5ca0b2"/>
  <circle cx="32" cy="4" r="6" fill="#3d8a9e"/>
  <circle cx="32" cy="4" r="3" fill="#8ec5d4"/>

  <!-- Head -->
  <rect x="8" y="14" width="48" height="42" rx="14" fill="#5ca0b2"/>
  <rect x="14" y="19" width="36" height="32" rx="10" fill="#4a8fa2"/>

  <!-- Ears -->
  <rect x="1" y="28" width="9" height="16" rx="4.5" fill="#5ca0b2"/>
  <rect x="54" y="28" width="9" height="16" rx="4.5" fill="#5ca0b2"/>

  <!-- Eyes -->
  <ellipse cx="24" cy="34" rx="7" ry="8" fill="#2e7a8e"/>
  <ellipse cx="40" cy="34" rx="7" ry="8" fill="#2e7a8e"/>
  <!-- Eye highlights -->
  <circle cx="26" cy="31" r="2.5" fill="#8ec5d4"/>
  <circle cx="42" cy="31" r="2.5" fill="#8ec5d4"/>
  <!-- Pupils -->
  <circle cx="24" cy="35" r="3" fill="#1a5a6e"/>
  <circle cx="40" cy="35" r="3" fill="#1a5a6e"/>

  <!-- Smile -->
  <path d="M24 44 Q32 52 40 44" stroke="#2e7a8e" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Light bulb accessory (knowledge/tips) -->
  <circle cx="54" cy="14" r="7" fill="#fbbf24" opacity="0.9"/>
  <circle cx="54" cy="14" r="4.5" fill="#fde68a"/>
  <line x1="54" y1="4" x2="54" y2="6" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="61" y1="11" x2="59" y2="12" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="61" y1="17" x2="59" y2="16" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
</svg>
